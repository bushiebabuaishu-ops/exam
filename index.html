<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Dexie DB Initialization ---
    const db = new Dexie('RoyalSyndicateDB_Secure');
    db.version(1).stores({
      users: 'username', 
      exams: 'id',
      results: 'id'
    });

    // --- WebAuthn & Web Crypto Configuration ---
    let globalCryptoKey = null; // Transient in-memory AES-GCM-256 key
    const APP_SALT = new TextEncoder().encode("RoyalExamSyndicate_V1_Salt_32B!!").buffer;

    const setCryptoKey = async (ikm) => {
      const keyMaterial = await crypto.subtle.importKey("raw", ikm, {name: "HKDF"}, false, ["deriveKey"]);
      globalCryptoKey = await crypto.subtle.deriveKey(
        {name: "HKDF", hash: "SHA-256", salt: new Uint8Array(32), info: new Uint8Array(0)},
        keyMaterial, {name: "AES-GCM", length: 256}, false, ["encrypt", "decrypt"]
      );
    };

    const encryptPayload = async (data) => {
      if (!globalCryptoKey) throw new Error("Cryptographic seals are unbroken (No Key).");
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encoded = new TextEncoder().encode(JSON.stringify(data));
      const ct = await crypto.subtle.encrypt({name: "AES-GCM", iv}, globalCryptoKey, encoded);
      return { iv: Array.from(iv), ct: Array.from(new Uint8Array(ct)) };
    };

    const decryptPayload = async (payload) => {
      if (!globalCryptoKey) throw new Error("Cryptographic seals are unbroken (No Key).");
      const iv = new Uint8Array(payload.iv);
      const ct = new Uint8Array(payload.ct);
      const decrypted = await crypto.subtle.decrypt({name: "AES-GCM", iv}, globalCryptoKey, ct);
      return JSON.parse(new TextDecoder().decode(decrypted));
    };

    const loadAllEncrypted = async (table) => {
      const records = await db[table].toArray();
      const decrypted = [];
      for (let r of records) {
        try {
          const data = await decryptPayload(r);
          decrypted.push(data);
        } catch(e) { /* Silently skip records encrypted by other passkeys in this local-first model */ }
      }
      return decrypted;
    };

    const saveEncryptedRecord = async (table, pkName, data) => {
      const enc = await encryptPayload(data);
      await db[table].put({ [pkName]: data[pkName], ...enc });
    };

    const getRpId = () => window.location.hostname || "localhost";

    // --- Luxurious Hybrid Configuration & Constants ---
    const THEME = { 
      dawnGold: "#D4AF37", duskPurple: "#2B1B3D", midnightBlue: "#0B101E", vellumWhite: "#FDFBF7",
      glassBg: "rgba(20, 25, 35, 0.45)", glassBorder: "rgba(212, 175, 55, 0.3)"
    };

    const globalStyles = `
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap');

      @keyframes hybridSky {
        0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
      }

      body {
        margin: 0; background: linear-gradient(-45deg, #090B10, #1F1633, #59351F, #8F6B32, #0D1424);
        background-size: 400% 400%; animation: hybridSky 25s ease infinite;
        color: ${THEME.vellumWhite}; font-family: 'Cormorant Garamond', serif; overflow: hidden; -webkit-font-smoothing: antialiased;
      }

      .vellum-texture {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 9999; opacity: 0.25;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        mix-blend-mode: overlay;
      }

      h1, h2, h3, .cinzel { font-family: 'Cinzel', serif; letter-spacing: 0.05em; }
      .text-gold { color: ${THEME.dawnGold}; text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

      .royal-glass-panel {
        position: relative; background: ${THEME.glassBg}; backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
        border-radius: 20px; border-top: 1px solid rgba(255, 255, 255, 0.15); border-left: 1px solid rgba(255, 255, 255, 0.05);
        border-bottom: 1px solid rgba(212, 175, 55, 0.2); border-right: 1px solid rgba(212, 175, 55, 0.1);
        box-shadow: 12px 15px 35px rgba(0, 0, 0, 0.6), -8px -8px 25px rgba(212, 175, 55, 0.06), inset 2px 2px 6px rgba(255, 255, 255, 0.1), inset -3px -3px 10px rgba(0, 0, 0, 0.4);
        transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); overflow: hidden;

      .royal-glass-panel::before {

      @keyframes liquidShimmer { 0% { left: -150%; } 100% { left: 200%; } }

      .elegant-input {
        background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(10px); border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.4); border-radius: 8px 8px 0 0;

      }
      .royal-button::before {

      }
      .royal-button:hover, .royal-button:focus { color: #FFF; border-color: ${THEME.dawnGold}; box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 20px rgba(212,175,55,0.4), inset 2px 2px 4px rgba(255,255,255,0.4); transform: translateY(-2px); text-shadow: 0 0 12px rgba(255, 255, 255, 0.6); }
      .royal-button:hover::before, .royal-button:focus::before { transform: scaleY(1); }
      .royal-button-gold { background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(0,0,0,0)); border-color: ${THEME.dawnGold}; box-shadow: 0 0 15px rgba(212,175,55,0.2), inset 1px 1px 3px rgba(255,255,255,0.3); }

      .gem-radio { appearance: none; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.4); border: 2px solid rgba(212,175,55,0.4); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8); position: relative; cursor: pointer; transition: all 0.3s; flex-shrink: 0; }
      .gem-radio:checked { background: ${THEME.dawnGold}; box-shadow: 0 0 15px ${THEME.dawnGold}, inset -2px -2px 5px rgba(0,0,0,0.4); border: 2px solid #FFF; }
      .gem-checkbox { appearance: none; width: 22px; height: 22px; border-radius: 6px; background: rgba(0,0,0,0.4); border: 2px solid rgba(212,175,55,0.4); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8); position: relative; cursor: pointer; transition: all 0.3s; flex-shrink: 0; }
      .gem-checkbox:checked { background: ${THEME.dawnGold}; box-shadow: 0 0 15px ${THEME.dawnGold}, inset -2px -2px 5px rgba(0,0,0,0.4); border: 2px solid #FFF; }
      .gem-checkbox:checked::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1A211E; font-size: 14px; font-weight: bold; font-family: sans-serif; }

      .book-container { perspective: 3500px; transform-style: preserve-3d; height: 100vh; overflow: hidden; }
      .page-layer { transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.9s ease, filter 0.9s ease; transform-origin: left center; transform-style: preserve-3d; backface-visibility: hidden; width: 100%; height: 100vh; overflow-y: auto; overflow-x: hidden; position: absolute; top: 0; left: 0; padding-bottom: 5rem; }
      .page-flip-out { transform: rotateY(-95deg) scale(0.95); opacity: 0; pointer-events: none; filter: blur(10px) brightness(0.5); }
      .page-flip-in { animation: turnIn 0.9s cubic-bezier(0.645, 0.045, 0.355, 1) forwards; }
      @keyframes turnIn { 0% { transform: rotateY(95deg) scale(0.95); opacity: 0; filter: blur(10px) brightness(1.5); } 100% { transform: rotateY(0deg) scale(1); opacity: 1; filter: blur(0) brightness(1); } }
      .animate-float { animation: float 6s ease-in-out infinite; }
      @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
      .stagger-fade-in > * { opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(5px); } to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }

      ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); } ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, rgba(212,175,55,0.3), rgba(212,175,55,0.7)); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); } ::-webkit-scrollbar-thumb:hover { background: ${THEME.dawnGold}; box-shadow: 0 0 10px ${THEME.dawnGold}; }

      /* Markdown Safestyles */
      .markdown-body p { margin-bottom: 1em; }
      .markdown-body strong { color: ${THEME.dawnGold}; font-family: 'Cinzel', serif; font-weight: 700; }
      .markdown-body em { font-style: italic; color: #E5E7EB; }
      .markdown-body code { background: rgba(0,0,0,0.3); padding: 0.2em 0.4em; border-radius: 4px; font-family: monospace; font-size: 0.9em; border: 1px solid rgba(212,175,55,0.2); }
      .markdown-body pre { background: rgba(0,0,0,0.5); padding: 1em; border-radius: 8px; overflow-x: auto; margin-bottom: 1em; border: 1px solid rgba(255,255,255,0.1); }
      
      /* Certificate - PURE LIGHT THEME & LANDSCAPE PRINT */
      .certificate-container { background-color: ${THEME.vellumWhite}; color: #1A211E; padding: 10px; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
      .certificate-border { padding: 4px; background: linear-gradient(135deg, #A68A41, #5c4d24, #A68A41); border-radius: 4px; }
      .certificate-inner { background: ${THEME.vellumWhite}; border: 1px solid #A68A41; box-shadow: inset 0 0 40px rgba(166,138,65,0.1); border-radius: 2px; }

      @media print {
        @page { size: landscape; margin: 1cm; }
        body, html { background: white !important; background-image: none !important; color: black !important; text-shadow: none !important; animation: none !important; }
        .vellum-texture, .no-print { display: none !important; }
        .royal-glass-panel { background: white !important; box-shadow: none !important; border: 1px solid #ccc !important; backdrop-filter: none !important; filter: none !important; color: black !important; }
        .text-gold, .text-white, span, h1, h2, h3, p, div { color: black !important; text-shadow: none !important; }
        .book-container, .page-layer { height: auto !important; min-height: auto !important; overflow: visible !important; position: relative !important; transform: none !important; animation: none !important; padding: 0 !important; perspective: none !important; }
        .certificate-container { box-shadow: none !important; margin: 0 !important; padding: 0 !important; background: white !important; }
        .certificate-border { background: white !important; border: 4px double #000 !important; box-shadow: none !important; padding: 10px !important; margin-bottom: 2rem !important; break-inside: avoid; }
        .certificate-inner { border: none !important; box-shadow: none !important; background: white !important; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      }
    `;

    const generateId = () => Math.random().toString(36).substr(2, 9);
    const toRoman = (num) => {
      const lookup = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
      let roman = ''; for (let i in lookup) { while (num >= lookup[i]) { roman += i; num -= lookup[i]; } } return roman;
    };
    
    const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23D4AF37'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";

    const compressImage = (file, callback, isManuscript = false) => {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas'); 
          const MAX_DIM = isManuscript ? 3000 : 256; 
          let width = img.width; let height = img.height;
          if (width > height) { if (width > MAX_DIM) { height *= MAX_DIM / width; width = MAX_DIM; } } 
          else { if (height > MAX_DIM) { width *= MAX_DIM / height; height = MAX_DIM; } }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
          const quality = isManuscript ? 0.98 : 0.8;
          callback(canvas.toDataURL('image/jpeg', quality)); 
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    };

    // --- New Camera Capture Component ---
    const CameraCapture = ({ onCapture, onCancel }) => {
      const videoRef = useRef(null);
      const [stream, setStream] = useState(null);

      useEffect(() => {
        navigator.mediaDevices.getUserMedia({ video: true })
          .then(s => { setStream(s); if(videoRef.current) videoRef.current.srcObject = s; })
          .catch(e => { alert("The scrying lens (camera) was denied."); onCancel(); });
        return () => { if(stream) stream.getTracks().forEach(t => t.stop()); }
      }, []);

      const capture = () => {
        const canvas = document.createElement('canvas');
        canvas.width = videoRef.current.videoWidth;
        canvas.height = videoRef.current.videoHeight;
        canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        stream.getTracks().forEach(t => t.stop());
        onCapture(dataUrl);
      };

      return (
        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
          <div className="bg-[#0B101E] border border-gold/50 p-6 rounded-xl flex flex-col items-center shadow-[0_0_30px_rgba(212,175,55,0.2)]">
            <h3 className="text-xl cinzel text-gold mb-4">Gaze into the Lens</h3>
            <video ref={videoRef} autoPlay playsInline className="max-w-full h-auto max-h-[60vh] rounded border border-white/20 mb-6 shadow-inner" />
            <div className="flex gap-4">
              <button onClick={capture} className="royal-button royal-button-gold">Capture Portrait</button>
              <button onClick={() => { stream?.getTracks().forEach(t=>t.stop()); onCancel(); }} className="royal-button">Cancel</button>
            </div>
          </div>
        </div>
      );
    };

    const ProfileHUD = ({ currentUser, handleLogout, handleProfilePicUpdate }) => {
      const [showCamera, setShowCamera] = useState(false);
      if (!currentUser) return null;
      return (
        <>
          <div className="flex items-center gap-4 no-print royal-glass-panel px-5 py-2 shadow-lg w-max mb-8" style={{ animation: 'fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards', opacity: 0, animationDelay: '0.15s' }}>
            <div className="flex flex-col text-left">
              <span className="text-[9px] uppercase tracking-widest text-gold cinzel font-bold">{currentUser.role}</span>
              <span className="text-sm italic text-white truncate max-w-[150px]">{currentUser.username}</span>
            </div>
            
            <div className="relative group flex items-center gap-2">
              <img src={currentUser.profilePic || DEFAULT_AVATAR} className="w-10 h-10 rounded-full border-2 border-gold object-cover shadow-[0_0_10px_rgba(212,175,55,0.4)]" />
              <div className="absolute top-12 left-1/2 -translate-x-1/2 bg-black/80 border border-gold/40 p-2 rounded flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity hidden group-hover:flex z-20">
                 <label className="text-[10px] uppercase font-bold text-white tracking-widest cursor-pointer hover:text-gold whitespace-nowrap">
                   Upload File
                   <input type="file" accept="image/*" className="hidden" onChange={(e) => { if(e.target.files[0]) compressImage(e.target.files[0], handleProfilePicUpdate, false) }} />
                 </label>
                 <button onClick={() => setShowCamera(true)} className="text-[10px] uppercase font-bold text-white tracking-widest cursor-pointer hover:text-gold whitespace-nowrap text-left">
                   Take Photo
                 </button>
              </div>
            </div>
            
            <div className="w-px h-6 bg-white/20 mx-1"></div>
            <button onClick={handleLogout} className="royal-button text-[9px] py-1.5 px-3">Sign Out</button>
          </div>
          {showCamera && <CameraCapture onCapture={(pic) => { handleProfilePicUpdate(pic); setShowCamera(false); }} onCancel={() => setShowCamera(false)} />}
        </>
      );
    };

    const FormattedText = ({ text, className }) => {
      useEffect(() => { if (window.MathJax) { window.MathJax.typesetPromise().catch(err => console.error(err)); } });
      const html = DOMPurify.sanitize(marked.parse(text || ""));
      return <div className={`markdown-body ${className}`} dangerouslySetInnerHTML={{ __html: html }} />;
    };

    function RoyalExamPortal() {
      const [currentUser, setCurrentUser] = useState(null);
      const [currentView, setCurrentView] = useState('AUTH');
      const [isFlipping, setIsFlipping] = useState(false);
      
      const [exams, setExams] = useState([]);
      const [allResults, setAllResults] = useState([]);
      const [allUsers, setAllUsers] = useState([]);
      
      const [activeExam, setActiveExam] = useState(null);
      const [studentResults, setStudentResults] = useState(null);
      
      const audioRef = useRef(null);

      useEffect(() => {
        if (!window.isSecureContext) {
           console.warn("WebAuthn requires a secure context (HTTPS/localhost). Features may fail.");
        }
        audioRef.current = new Audio('https://actions.google.com/sounds/v1/office/paper_flip.ogg'); audioRef.current.volume = 0.5;
      }, []);

      // Reload encrypted data whenever user successfully logs in and generates the key
      const reloadEncryptedData = async () => {
         const users = await loadAllEncrypted('users'); setAllUsers(users);
         const dbExams = await loadAllEncrypted('exams'); setExams(dbExams);
         const dbResults = await loadAllEncrypted('results'); setAllResults(dbResults);
      };

      const saveExams = async (newExams) => { 
        setExams(newExams); 
        for (const ex of newExams) {
            if (!(await db.exams.get(ex.id))) {
               await saveEncryptedRecord('exams', 'id', ex);
            }
        }
      };
      
      const saveResult = async (newResult) => { 
        setAllResults(prev => [...prev, newResult]);
        await saveEncryptedRecord('results', 'id', newResult);
      };

      const updateResult = async (updatedResult) => {
        setAllResults(prev => prev.map(r => (r.id === updatedResult.id) ? updatedResult : r));
        await saveEncryptedRecord('results', 'id', updatedResult); // Overwrites existing
      };

      const handleLoginSuccess = async (user) => { 
        await reloadEncryptedData();
        setCurrentUser(user); 
        navigateTo(user.role === 'TEACHER' ? 'TEACHER_DASH' : 'STUDENT_DASH'); 
      };

      const handleLogout = () => { 
        globalCryptoKey = null; // Purge transient key
        setCurrentUser(null); setExams([]); setAllResults([]); setAllUsers([]);
        navigateTo('AUTH'); 
      };

      const navigateTo = (view, payload = null) => {
        if (audioRef.current) { audioRef.current.currentTime = 0; audioRef.current.play().catch(() => {}); }
        setIsFlipping(true);
        setTimeout(() => {
          if (payload?.exam) setActiveExam(payload.exam);
          if (payload?.results) setStudentResults(payload.results);
          setCurrentView(view); setIsFlipping(false); document.querySelector('.page-layer')?.scrollTo(0,0);
        }, 450);
      };

      const handleProfilePicUpdate = async (newPicBase64) => {
        const updatedUser = { ...currentUser, profilePic: newPicBase64 };
        setCurrentUser(updatedUser);
        await saveEncryptedRecord('users', 'username', updatedUser);
        await reloadEncryptedData();
      };

      return (
        <div className="book-container">
          <style dangerouslySetInnerHTML={{ __html: globalStyles }} />
          <div className="vellum-texture"></div>

          <div className={`page-layer ${isFlipping ? 'page-flip-out' : 'page-flip-in'} flex flex-col items-center py-16 px-4 sm:px-8`}>
            {currentView === 'AUTH' && <AuthView onLogin={handleLoginSuccess} />}

        e.preventDefault();
        if (!username) return alert("The ledger requires an identifier.");
        setIsLoading(true);
        try {
          const uid = crypto.getRandomValues(new Uint8Array(16));
          let prfOutput;
          let credentialId = crypto.getRandomValues(new Uint8Array(16)); // fallback mock

          if (isSecureContext) {
            const cred = await navigator.credentials.create({
                publicKey: {
                    challenge: crypto.getRandomValues(new Uint8Array(32)),
                    rp: { name: "Royal Exam Syndicate", id: getRpId() },
                    user: { id: uid, name: username, displayName: username },
                    pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
                    authenticatorSelection: { authenticatorAttachment: "cross-platform", userVerification: "required" },
                    extensions: { prf: { eval: { first: APP_SALT } } }
                }
            });
            const extResults = cred.getClientExtensionResults();
            if (extResults.prf && extResults.prf.results) {
               prfOutput = extResults.prf.results.first;
            } else {
               // Fallback: WebAuthn succeeded, but PRF extension is not supported by the authenticator.
               const pin = prompt("⚠️ Thy passkey lacks the PRF extension.\n\nEnter a secure Vault PIN to forge your cryptographic seal:");
               if (!pin) throw new Error("A Vault PIN is required when PRF is unavailable.");
               prfOutput = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin + "secure_fallback_salt"));
            }
            credentialId = new Uint8Array(cred.rawId);
          } else {
            const pin = prompt("⚠️ INSECURE CONTEXT (No HTTPS/Localhost detected).\nWebAuthn blocked by browser.\n\nEnter a DEV PIN to simulate passkey PRF for local encryption:");
            if (!pin) throw new Error("Dev PIN required in insecure contexts.");
            prfOutput = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin + "dev_salt"));
          }

          await setCryptoKey(prfOutput);

          const userData = { username, role, profilePic, uid: Array.from(uid), credentialId: Array.from(credentialId) };
          await saveEncryptedRecord('users', 'username', userData);

      const handleLogin = async (e) => {
        e.preventDefault();
        setIsLoading(true);
        try {
          let prfOutput;
          let handle = null;

          if (isSecureContext) {
            const cred = await navigator.credentials.get({
                publicKey: {
                    challenge: crypto.getRandomValues(new Uint8Array(32)),
                    rpId: getRpId(),
                    userVerification: "required",
                    extensions: { prf: { eval: { first: APP_SALT } } }
                }
            });
            const extResults = cred.getClientExtensionResults();
            if (extResults.prf && extResults.prf.results) {
               prfOutput = extResults.prf.results.first;
            } else {
               // Fallback for missing PRF during login
               const pin = prompt("⚠️ Thy passkey lacks the PRF extension.\n\nEnter your Vault PIN to unlock your local records:");
               if (!pin) throw new Error("A Vault PIN is required when PRF is unavailable.");
               prfOutput = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin + "secure_fallback_salt"));
            }
            handle = new Uint8Array(cred.response.userHandle);
          } else {
            const pin = prompt("⚠️ INSECURE CONTEXT (No HTTPS/Localhost detected).\nWebAuthn blocked by browser.\n\nEnter your DEV PIN to unlock the local vault:");
            if (!pin) throw new Error("Dev PIN required in insecure contexts.");
            prfOutput = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin + "dev_salt"));
          }
          
          await setCryptoKey(prfOutput);
          
          const usersRaw = await db.users.toArray();
          let matchedUser = null;

          for (let u of usersRaw) {
             try {
                const dec = await decryptPayload(u);
                if (handle) {
                    const decUid = new Uint8Array(dec.uid);
                    if (handle.every((val, i) => val === decUid[i])) {
                        matchedUser = dec; break;
                    }
                } else {
                    matchedUser = dec; break; // In fallback mode, first successful decryption logs us in
                }
             } catch(err) { /* Not their record */ }
          }
          
          if (matchedUser) {
             onLogin(matchedUser);
          } else {
             throw new Error("Passkey recognized/PIN valid, but local archives lack thy record.");
          }

        } catch(err) {
          console.error(err);
          alert("The seals rejected thy credential: " + err.message);
          globalCryptoKey = null;

        setIsLoading(false);

      if (isLoading) return (

            {!isSecureContext && (

                 <p className="text-red-300 text-sm font-bold tracking-wide mb-1">⚠️ WebAuthn Blocked by Browser</p>

               </div>
            )}

            <div className="space-y-6">
              {isSignup && (
                <div className="flex flex-col items-center mb-6">
                  <div className="relative w-24 h-24 rounded-full border-2 border-gold/50 bg-black/40 overflow-hidden mb-3 flex items-center justify-center">
                    {profilePic ? <img src={profilePic} className="w-full h-full object-cover" /> : <span className="text-[10px] text-white/40 uppercase text-center tracking-widest">Thy Portrait</span>}

                      Camera

                  </div>
                </div>
              )}

              {isSignup && (
                <div>
                  <label className="block text-xs font-bold cinzel text-gold tracking-[0.2em] mb-3">Identifier</label>
                  <input required type="text" className="elegant-input" placeholder="Thy designated name..." value={username} onChange={e => setUsername(e.target.value)} />
                </div>

              {isSignup && (

                  <div className="flex gap-4">
                    <button type="button" onClick={() => setRole('STUDENT')} className={`flex-1 p-3 border rounded-lg transition-all cinzel text-sm font-bold tracking-widest ${role === 'STUDENT' ? 'border-[#D4AF37] bg-[#D4AF37]/20 text-white shadow-[inset_0_0_15px_rgba(212,175,55,0.4)]' : 'border-white/20 text-white/50 hover:bg-white/5'}`}>Apprentice</button>

                  </div>

              <div className="pt-4 space-y-4">
                {isSignup ? (

                    <span>Inscribe with Passkey</span>
                    <span className="text-[9px] opacity-60 normal-case tracking-normal mt-1">(Requires 3rd-Party Password Manager with PRF)</span>

                ) : (

    function CreateExam({ navigate, saveExams, exams, currentUser, handleLogout, handleProfilePicUpdate }) {
      const [title, setTitle] = useState('');
      const [scheduledDate, setScheduledDate] = useState('');
      const [duration, setDuration] = useState('');
      const [secretCredential, setSecretCredential] = useState('');
      const [questions, setQuestions] = useState([]);

      const [showAIModal, setShowAIModal] = useState(false);
      const [aiRawText, setAiRawText] = useState('');
      const [isParsing, setIsParsing] = useState(false);

      const addQuestion = (type) => {
        let base = { id: generateId(), type, text: '', marks: 5 };
        if (type === 'mcq') base = { ...base, options: ['', '', '', ''], correctOption: 0 };
        else if (type === 'multi-mcq') base = { ...base, options: ['', '', '', ''], correctOptions: [] };
        else if (type === 'numerical') base = { ...base, correctAnswer: 0 };
        else if (type === 'subjective') base = { ...base, sampleAnswer: '' };
        setQuestions([...questions, base]);
      };
      
      const updateQuestion = (idx, field, val) => { const up = [...questions]; up[idx] = { ...up[idx], [field]: val }; setQuestions(up); };

      // Variable Options Handlers
      const addOptionToQuestion = (qIndex) => {
        const up = [...questions]; up[qIndex].options.push(''); setQuestions(up);
      };
      const removeOptionFromQuestion = (qIndex, optIndex) => {
        const up = [...questions];
        up[qIndex].options.splice(optIndex, 1);
        // adjust correct options if needed
        if (up[qIndex].type === 'mcq' && up[qIndex].correctOption >= up[qIndex].options.length) up[qIndex].correctOption = Math.max(0, up[qIndex].options.length - 1);
        if (up[qIndex].type === 'multi-mcq') up[qIndex].correctOptions = up[qIndex].correctOptions.filter(i => i !== optIndex).map(i => i > optIndex ? i - 1 : i);
        setQuestions(up);
      };

      const handleSeal = () => {
        if (!title || !scheduledDate || !duration || !secretCredential || questions.length === 0) return alert("The decree is incomplete. Fill all inscriptions.");
        saveExams([...exams, { id: generateId(), title, scheduledDate, duration: parseInt(duration), secretCredential, createdBy: currentUser.username, questions }]);
        navigate('TEACHER_DASH');
      };

      const handleAIParse = async () => {
        const apiKey = localStorage.getItem('royalOracleKey');
        if (!apiKey) return alert("The Oracle sleeps. Configure API key in the Master's Sanctum.");
        if (!aiRawText.trim()) return;

        setIsParsing(true);
        try {
          const prompt = `You are a strict Royal Academic Examiner. Parse the following raw text (which may be from a Word doc, message, etc.) into an exam questionnaire.
          Return ONLY a valid JSON array of objects. Exactly match this schema for each question:
          [
            { "type": "mcq", "text": "Question text?", "marks": 5, "options": ["Option A", "Option B", "Option C", "Option D"], "correctOption": 0 },
            { "type": "multi-mcq", "text": "Question text?", "marks": 5, "options": ["A", "B", "C", "D"], "correctOptions": [0, 2] },
            { "type": "numerical", "text": "Question?", "marks": 5, "correctAnswer": 42 },
            { "type": "subjective", "text": "Question?", "marks": 10, "sampleAnswer": "Ideal answer." }
          ]
          Infer marks reasonably (default 5). Determine type based on context.
          Raw Text:
          ${aiRawText}`;

          const payload = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } };
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error("Oracle unavailable");
          const data = await res.json();
          const parsedArr = JSON.parse(data.candidates[0].content.parts[0].text);
          
          const newQs = parsedArr.map(q => ({ ...q, id: generateId() }));
          setQuestions([...questions, ...newQs]);
          setShowAIModal(false);
          setAiRawText('');
        } catch(e) {
          alert("Parsing failed: " + e.message);
        }
        setIsParsing(false);
      };

      return (

    async function gradeWithOracle(questionsAndAnswers, apiKey) {
      if (!questionsAndAnswers || questionsAndAnswers.length === 0) return [];
      if (!apiKey) return questionsAndAnswers.map(qa => ({ id: qa.id, marks: 0, correctAnswerDisplay: "Oracle slumbering." }));
      const prompt = `You are a strict Royal Academic Examiner. Grade the subjective answers. Use 'teacherSampleAnswer' as definitive rubric.
      ${JSON.stringify(questionsAndAnswers)}
      Return ONLY a JSON array: [{"id": "string", "marks": number, "correctAnswerDisplay": "string (ideal answer reference)"}]`;
      const payload = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } };
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const delays = [1000, 2000, 4000];
      for (let i = 0; i <= delays.length; i++) {
        try {
          const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error();
          const data = await res.json(); return JSON.parse(data.candidates[0].content.parts[0].text);
        } catch (e) {
          if (i === delays.length) return questionsAndAnswers.map(qa => ({ id: qa.id, marks: 0, correctAnswerDisplay: "Oracle indisposed." }));
          await new Promise(r => setTimeout(r, delays[i]));
        }
      }
    }

    function ExamRunner({ exam, currentUser, saveResult, navigate }) {
      const [answers, setAnswers] = useState({});
      const [timeLeft, setTimeLeft] = useState(0);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const answersRef = useRef(answers); const isSubmittingRef = useRef(false);
      
      useEffect(() => { answersRef.current = answers; }, [answers]);

      const triggerSubmission = async () => {
        if (isSubmittingRef.current) return;
        isSubmittingRef.current = true; setIsSubmitting(true);
        
        const finalAnswers = answersRef.current; let marks = 0; let details = []; const subToGrade = [];
        let requiresManualReview = false;

        for (const q of exam.questions) {
          if (q.type === 'mcq') { 
            const ok = finalAnswers[q.id] === q.correctOption; marks += ok ? q.marks : 0; 
            details.push({ 
               questionText: q.text, type: 'mcq', marksAwarded: ok ? q.marks : 0, maxMarks: q.marks, 
               studentAnswerDisplay: finalAnswers[q.id] !== undefined ? q.options[finalAnswers[q.id]] : "Blank",
               correctAnswerDisplay: q.options[q.correctOption]
            }); 
          }
          else if (q.type === 'multi-mcq') {
            const studentAns = finalAnswers[q.id] || []; const correctAns = q.correctOptions || [];
            const isCorrect = studentAns.length === correctAns.length && studentAns.every(val => correctAns.includes(val)); marks += isCorrect ? q.marks : 0;
            details.push({ 
               questionText: q.text, type: 'multi-mcq', marksAwarded: isCorrect ? q.marks : 0, maxMarks: q.marks, 
               studentAnswerDisplay: studentAns.map(i => q.options[i]).join(' & ') || "Blank",
               correctAnswerDisplay: correctAns.map(i => q.options[i]).join(' & ')
            });
          }
          else if (q.type === 'numerical') {
            const studentAns = parseInt(finalAnswers[q.id], 10); const correctAns = parseInt(q.correctAnswer, 10);
            const isCorrect = studentAns === correctAns; marks += isCorrect ? q.marks : 0;
            details.push({ 
               questionText: q.text, type: 'numerical', marksAwarded: isCorrect ? q.marks : 0, maxMarks: q.marks, 
               studentAnswerDisplay: isNaN(studentAns) ? "Blank" : studentAns.toString(),
               correctAnswerDisplay: correctAns.toString()
            });
          }
          else if (q.type === 'subjective') { 
            const isManualReq = finalAnswers[`${q.id}_manual`] || finalAnswers[`${q.id}_image`];
            if (isManualReq) {
               requiresManualReview = true;
               details.push({
                 questionText: q.text, type: 'subjective', needsManualGrading: true,
                 studentAnswer: finalAnswers[q.id] || "", studentImage: finalAnswers[`${q.id}_image`] || null,
                 marksAwarded: 0, maxMarks: q.marks,
                 studentAnswerDisplay: "Manuscript File", correctAnswerDisplay: "Pending Review"
               });
            } else {
               subToGrade.push({ id: q.id, question: q.text, maxMarks: q.marks, answer: finalAnswers[q.id] || "", teacherSampleAnswer: q.sampleAnswer || "" }); 
            }
          }
        }
        
        if (subToGrade.length > 0) {
          const ai = await gradeWithOracle(subToGrade, localStorage.getItem('royalOracleKey'));
          ai.forEach(a => { 
            const originalQ = exam.questions.find(q=>q.id===a.id); const awarded = Math.min(Math.max(0, a.marks), originalQ.marks); marks += awarded; 
            details.push({ 
               questionText: originalQ.text, type: 'subjective', needsManualGrading: false, marksAwarded: awarded, maxMarks: originalQ.marks, 
               studentAnswerDisplay: finalAnswers[originalQ.id] || "Blank", correctAnswerDisplay: a.correctAnswerDisplay || originalQ.sampleAnswer || "Refer to manual rubric"
            }); 
          });
        }

        const resultId = generateId();
        const resultData = { 
          id: resultId, examId: exam.id, examTitle: exam.title, teacherName: exam.createdBy, studentName: currentUser.username, 
          status: requiresManualReview ? 'PENDING' : 'GRADED',
          totalMarks: marks, maxMarks: exam.questions.reduce((a,c)=>a+c.marks,0), details, dateCompleted: new Date().toISOString() 
        };
        
        await saveResult(resultData); 

        if (requiresManualReview) navigate('STUDENT_DASH'); else navigate('CERTIFICATE', { results: resultData });
      };

      useEffect(() => {
        const block = (e) => e.preventDefault();
        document.addEventListener('contextmenu', block); document.addEventListener('copy', block); document.addEventListener('cut', block); document.addEventListener('paste', block);
        const endMs = new Date(exam.scheduledDate).getTime() + (exam.duration * 60000);
        const tick = () => { const left = Math.floor((endMs - Date.now()) / 1000); if (left <= 0) { setTimeLeft(0); triggerSubmission(); } else { setTimeLeft(left); } };
        tick(); const timerId = setInterval(tick, 1000);
        return () => { clearInterval(timerId); document.removeEventListener('contextmenu', block); document.removeEventListener('copy', block); document.removeEventListener('cut', block); document.removeEventListener('paste', block); };
      }, []);

      const formatTime = (sec) => `${Math.floor(sec / 60).toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`;

      if (isSubmitting) return (
        <div className="flex flex-col items-center justify-center min-h-screen text-center px-4">
          <div className="w-32 h-32 mb-8 relative"> <div className="absolute inset-0 border-4 border-gold/20 rounded-full"></div> <div className="absolute inset-0 border-4 border-t-gold rounded-full animate-spin"></div> </div>
          <h2 className="text-4xl cinzel text-gold mb-6 animate-pulse font-bold drop-shadow-lg">Encrypting & Submitting...</h2>
          <p className="italic text-white/70 max-w-lg text-xl leading-relaxed">Thy scrolls are being sealed cryptographically into the local vault.</p>
        </div>
      );

      return (
        <div className="max-w-5xl w-full sealed-exam relative pb-32 pt-10 stagger-fade-in flex flex-col">
          <header className="flex flex-col md:flex-row justify-between items-center md:items-start mb-16 gap-8" style={{animationDelay: '0.1s'}}>
            <div className="text-center md:text-left flex-1">
              <h1 className="text-4xl md:text-5xl lg:text-6xl cinzel mb-6 font-bold text-white drop-shadow-xl leading-tight">{exam.title}</h1>
              <div className="w-48 h-[2px] bg-gradient-to-r from-[#D4AF37] to-transparent mx-auto md:mx-0"></div>
            </div>
            <div className="royal-glass-panel px-8 py-5 flex flex-col items-center shadow-2xl flex-shrink-0">
              <span className="block text-[10px] uppercase cinzel font-bold mb-1 tracking-[0.3em] text-gold">Hourglass</span>
              <span className={`text-4xl sm:text-5xl cinzel font-bold drop-shadow-lg transition-colors duration-1000 ${timeLeft < 300 ? 'text-red-400 animate-pulse' : 'text-white'}`}>{formatTime(timeLeft)}</span>
            </div>
          </header>

          <div className="space-y-16">
            {exam.questions.map((q, qIndex) => (
              <div key={q.id} className="royal-glass-panel p-6 md:p-12 relative" style={{animationDelay: `${0.3 + (qIndex * 0.1)}s`}}>
                <div className="flex items-start md:items-center gap-5 md:gap-8 mb-10 border-b border-white/10 pb-6 md:pb-8 flex-col md:flex-row">
                  <div className="flex items-center gap-4 w-full md:w-auto border-b md:border-b-0 border-white/10 pb-4 md:pb-0">
                    <div className="w-14 h-14 bg-[#0D1424] border border-gold/50 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(212,175,55,0.3)] flex-shrink-0">
                      <span className="text-2xl cinzel text-gold font-bold drop-shadow-md">{toRoman(qIndex + 1)}</span>
                    </div>
                  </div>
                  <FormattedText text={q.text} className="text-xl md:text-2xl flex-1 w-full" />
                  <span className="flex-shrink-0 text-xs md:text-sm font-bold cinzel border border-gold/40 bg-gold/10 px-4 py-2 rounded-lg text-gold whitespace-nowrap shadow-inner">{q.marks} Marks</span>
                </div>
                
                <div className="pl-0 md:pl-20">
                  {q.type === 'mcq' && (
                    <div className="space-y-4">
                      {q.options.map((opt, optIndex) => (
                        <button key={optIndex} onClick={() => setAnswers(p => ({...p, [q.id]: optIndex}))} className={`w-full text-left p-5 md:p-6 border rounded-xl transition-all duration-300 text-base md:text-lg flex items-center gap-4 md:gap-6 active:scale-[0.98] ${answers[q.id] === optIndex ? 'border-gold bg-gold/25 shadow-[0_0_20px_rgba(212,175,55,0.4),inset_0_0_20px_rgba(212,175,55,0.2)] text-white scale-[1.01]' : 'border-white/10 bg-black/20 hover:bg-black/40 hover:border-gold/30 text-white/80'}`}>
                          <input type="radio" checked={answers[q.id] === optIndex} readOnly className="gem-radio pointer-events-none" />
                          <span><span className="font-bold cinzel mr-3 md:mr-4 text-gold opacity-80">{String.fromCharCode(65 + optIndex)}.</span>{opt}</span>
                        </button>
                      ))}
                    </div>
                  )}

                  {q.type === 'multi-mcq' && (
                    <div className="space-y-4">
                      {q.options.map((opt, optIndex) => {
                        const isSelected = (answers[q.id] || []).includes(optIndex);
                        return (
                          <button key={optIndex} onClick={() => {
                            setAnswers(p => {
                              const current = p[q.id] || []; const newAns = isSelected ? current.filter(i => i !== optIndex) : [...current, optIndex];
                              return { ...p, [q.id]: newAns };
                            });
                          }} className={`w-full text-left p-5 md:p-6 border rounded-xl transition-all duration-300 text-base md:text-lg flex items-center gap-4 md:gap-6 active:scale-[0.98] ${isSelected ? 'border-gold bg-gold/25 shadow-[0_0_20px_rgba(212,175,55,0.4),inset_0_0_20px_rgba(212,175,55,0.2)] text-white scale-[1.01]' : 'border-white/10 bg-black/20 hover:bg-black/40 hover:border-gold/30 text-white/80'}`}>
                            <input type="checkbox" checked={isSelected} readOnly className="gem-checkbox pointer-events-none" />
                            <span><span className="font-bold cinzel mr-3 md:mr-4 text-gold opacity-80">{String.fromCharCode(65 + optIndex)}.</span>{opt}</span>
                          </button>
                        );
                      })}
                    </div>
                  )}

                  {q.type === 'numerical' && (
                    <div className="mt-8">
                      <input type="number" className="elegant-input w-full text-center text-4xl p-8 border-gold/30 bg-black/40 focus:bg-black/60 rounded-xl font-cinzel" placeholder="Inscribe integer..." value={answers[q.id] !== undefined ? answers[q.id] : ''} onChange={(e) => setAnswers(p => ({...p, [q.id]: e.target.value}))} />
                    </div>
                  )}

                  {q.type === 'subjective' && (
                    <div className="flex flex-col gap-6">
                      <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 p-4 border border-white/10 bg-black/20 rounded-lg">
                        <label className="flex items-center gap-3 cursor-pointer group">
                           <input type="checkbox" className="gem-checkbox" checked={answers[`${q.id}_manual`] || !!answers[`${q.id}_image`]} onChange={(e) => setAnswers(p => ({...p, [`${q.id}_manual`]: e.target.checked}))} disabled={!!answers[`${q.id}_image`]} />
                           <span className="text-sm font-bold tracking-widest text-gold uppercase group-hover:text-white transition-colors">Bypass Oracle (Manual Review)</span>
                        </label>
                        <label className="royal-button py-2 px-6 text-xs cursor-pointer">
                           Upload Manuscript Canvas
                           <input type="file" accept="image/*" hidden onChange={(e) => { if(e.target.files[0]) compressImage(e.target.files[0], (base64) => setAnswers(p => ({...p, [`${q.id}_image`]: base64})), true) }}/>
                        </label>
                      </div>
                      
                      {answers[`${q.id}_image`] && (
                         <div className="relative inline-block border border-gold/40 p-2 rounded bg-black/50">
                            <img src={answers[`${q.id}_image`]} className="max-w-xs md:max-w-md rounded" />
                            <button onClick={() => setAnswers(p => { const newP = {...p}; delete newP[`${q.id}_image`]; return newP; })} className="absolute top-0 right-0 bg-red-900/80 text-white rounded-full w-6 h-6 flex items-center justify-center -mt-3 -mr-3 border border-white/50 hover:bg-red-600">×</button>
                         </div>
                      )}

                      <textarea className="elegant-input resize-none w-full border-gold/30 bg-black/40 focus:bg-black/60 p-8 text-xl leading-loose rounded-xl" rows="6" placeholder="Inscribe detailed reasoning or present manuscript above..." value={answers[q.id] || ''} onChange={(e) => setAnswers(p => ({...p, [q.id]: e.target.value}))} spellCheck="false"></textarea>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
          
          <div className="mt-24 text-center relative z-10 animate-float" style={{animationDuration: '4s'}}>
            <button onClick={() => triggerSubmission()} className="royal-button royal-button-gold text-2xl px-20 py-8 shadow-[0_0_40px_rgba(212,175,55,0.4)] rounded-xl tracking-widest font-black">Seal & Submit Scroll</button>
          </div>
        </div>
      );
    }

    function Certificate({ results, navigate, currentUser, handleLogout, handleProfilePicUpdate }) {
      if (!results) return null;
      const pct = (results.totalMarks / results.maxMarks) * 100;
      const standing = pct >= 90 ? "Summa Cum Laude" : pct >= 80 ? "Magna Cum Laude" : pct >= 70 ? "Cum Laude" : "Requires Remediation";

      return (
        <div className="max-w-5xl w-full pt-4 pb-32 stagger-fade-in text-[#1A211E]">
          {currentUser && handleLogout && <div className="mb-6"><ProfileHUD currentUser={currentUser} handleLogout={handleLogout} handleProfilePicUpdate={handleProfilePicUpdate} /></div>}

          <div className="certificate-container" style={{animationDelay: '0.1s'}}>
            <div className="certificate-border">
              <div className="certificate-inner p-10 md:p-16 relative overflow-hidden bg-[#FDFBF7]">
                
                {/* Ornaments */}
                <div className="absolute top-6 left-6 w-16 h-16 border-t-4 border-l-4 border-[#A68A41] opacity-80"></div>
                <div className="absolute top-6 right-6 w-16 h-16 border-t-4 border-r-4 border-[#A68A41] opacity-80"></div>
                <div className="absolute bottom-6 left-6 w-16 h-16 border-b-4 border-l-4 border-[#A68A41] opacity-80"></div>
                <div className="absolute bottom-6 right-6 w-16 h-16 border-b-4 border-r-4 border-[#A68A41] opacity-80"></div>

                <div className="text-center mb-10">
                  <h1 className="text-3xl cinzel text-[#A68A41] mb-4 tracking-[0.3em] uppercase font-bold">Certificate of Evaluation</h1>
                  <h2 className="text-5xl cinzel font-black mb-8 pb-6 border-b border-[#A68A41]/50 inline-block px-12 text-[#1A211E]">{results.examTitle}</h2>
                </div>
                
                <div className="flex justify-around items-center mb-12 text-center w-full relative z-10 gap-4">
                  <div className="flex-1 p-4">
                    <span className="block text-[10px] uppercase tracking-[0.2em] cinzel text-[#A68A41] mb-2 font-bold">Scholar Appraised</span>
                    <span className="text-3xl cinzel font-bold text-[#1A211E]">{results.studentName}</span>
                  </div>
                  
                  <div className="flex-1 text-center border-l border-r border-[#A68A41]/30 px-6">
                    <div className="text-center"><span className="block text-[10px] uppercase tracking-widest cinzel mb-1 text-[#1A211E]/60 font-bold">Marks Awarded</span><span className="text-6xl cinzel font-black text-[#1A211E]">{results.totalMarks}</span></div>
                    <div className="w-16 h-px bg-[#A68A41] mx-auto my-2"></div>
                    <div className="text-center"><span className="text-3xl cinzel font-bold text-[#1A211E]/60">{results.maxMarks}</span><span className="block text-[10px] uppercase tracking-widest cinzel mt-1 text-[#1A211E]/60 font-bold">Total Possible</span></div>
                  </div>

                  <div className="flex-1 p-4">
                    <span className="block text-[10px] uppercase tracking-[0.2em] cinzel text-[#A68A41] mb-2 font-bold">Syndicate Master</span>
                    <span className="text-3xl cinzel font-bold text-[#1A211E]">{results.teacherName}</span>
                  </div>
                </div>

                <div className="text-center mb-12">
                  <h3 className={`text-4xl cinzel font-black mb-2 uppercase tracking-[0.1em] ${pct >= 70 ? 'text-[#A68A41]' : 'text-red-800'}`}>{standing}</h3>
                  <p className="italic text-lg text-[#1A211E]/70 relative z-10">Inscribed into the secure archives on {new Date(results.dateCompleted).toLocaleDateString()}</p>
                </div>
                
                <div className="mt-12 border-t-2 border-[#A68A41]/30 pt-8">
                  <h3 className="text-2xl cinzel text-center mb-8 font-bold text-[#1A211E] tracking-widest uppercase">Evaluation Breakdown</h3>
                  <div className="space-y-6 text-left">
                    {results.details.map((det, idx) => {
                      const isFull = det.marksAwarded === det.maxMarks; const isZero = det.marksAwarded === 0;
                      const statusText = isFull ? 'Correct' : isZero ? 'Incorrect' : 'Partial';
                      const statusColor = isFull ? 'text-green-700 bg-green-50 border-green-200' : isZero ? 'text-red-700 bg-red-50 border-red-200' : 'text-[#A68A41] bg-yellow-50 border-yellow-200';
                      
                      return (
                        <div key={idx} className="border-l-4 border-[#A68A41] pl-6 py-4 bg-white/50 rounded-r-lg flex justify-between items-center gap-6 shadow-sm border border-black/5">
                          <div className="flex-1">
                            <div className="font-bold mb-3 text-xl text-[#1A211E] flex gap-2"><span>Q{idx + 1}.</span> <FormattedText text={det.questionText} className="inline-block text-lg" /></div>
                            <p className="italic text-[#1A211E]/80 text-sm leading-relaxed mb-1"><span className="font-bold not-italic cinzel text-[10px] text-[#A68A41] tracking-widest uppercase mr-1">Scholar's Mark:</span> {det.studentAnswerDisplay || "None"}</p>
                            <p className="italic text-[#1A211E]/80 text-sm leading-relaxed"><span className="font-bold not-italic cinzel text-[10px] text-[#A68A41] tracking-widest uppercase mr-1">The True Mark:</span> {det.correctAnswerDisplay}</p>
                          </div>
                          <div className="flex flex-col items-end gap-2 shrink-0">
                             <span className={`text-sm font-bold uppercase tracking-widest px-3 py-1 rounded border ${statusColor}`}>{statusText}</span>
                             <span className="font-bold text-xl text-[#1A211E]">{det.marksAwarded} <span className="text-sm opacity-60">/ {det.maxMarks}</span></span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

              </div>
            </div>
          </div>

          <div className="mt-16 text-center flex justify-center gap-8 no-print" style={{animationDelay: '0.3s'}}>
            <button onClick={() => window.print()} className="royal-button royal-button-gold px-12 py-4 text-lg">Inscribe to Paper (Print)</button>
            <button onClick={() => navigate('STUDENT_DASH')} className="royal-button px-12 py-4 text-lg bg-black/30 !text-[#D4AF37] hover:!text-white border-[#D4AF37]/40">Return to Hall</button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RoyalExamPortal />);
  </script>
</body>
</html>
